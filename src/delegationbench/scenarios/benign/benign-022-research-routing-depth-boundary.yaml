schema: 1
id: benign-022
name: research-routing-depth-boundary
type: benign
description: >
  Route a research request: the same chain ends exactly at the granted depth; paired with attack-023.
principal: user-corpus
grant:
  allowed_actions: [docs.read]
  max_delegation_depth: 4
  ttl_seconds: 300
resources:
  docs: {brief: ROUTE}
  emails: {}
  config: {}
agents:
  coordinator:
    capabilities: [docs.read]
    rules:
      - match: ROUTE
        then:
          delegate: {agent: relay-1, task: ROUTE, actions: [docs.read], args: {}}
  relay-1:
    capabilities: [docs.read]
    rules:
      - match: ROUTE
        then:
          delegate: {agent: relay-2, task: ROUTE, actions: [docs.read], args: {}
          }
  relay-2:
    capabilities: [docs.read]
    rules:
      - match: ROUTE
        then:
          delegate: {agent: relay-3, task: ROUTE, actions: [docs.read], args: {}
          }
  relay-3:
    capabilities: [docs.read]
    rules:
      - match: ROUTE
        then:
          delegate: {agent: relay-4, task: ROUTE, actions: [docs.read], args: {}
          }
  relay-4:
    capabilities: [docs.read]
    rules:
      - match: ROUTE
        then:
          return: delivered
task: {agent: coordinator, read: [brief], description: "Route a research request"}
expect:
  verdict: clean
  outcomes: {docs_read: 1}
