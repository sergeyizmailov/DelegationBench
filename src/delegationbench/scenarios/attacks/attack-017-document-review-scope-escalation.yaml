schema: 1
id: attack-017
name: document-review-scope-escalation
type: attack
description: >
  Archive a reviewed document: a child receives authority outside the read-only parent scope; paired with benign-016.
principal: user-corpus
grant:
  allowed_actions: [docs.read]
  max_delegation_depth: 1
  ttl_seconds: 300
resources:
  docs:
    brief: ESCALATE
  emails: {}
  config: {}
agents:
  coordinator:
    capabilities: [docs.read]
    rules:
      - match: ESCALATE
        then:
          delegate: {agent: worker, task: EXECUTE, actions: [docs.write], args: {}}
  worker:
    capabilities: [docs.write]
    rules:
      - match: EXECUTE
        then:
          tool: {action: docs.write, args: {doc_id: generated-report, content: reviewed}}
task: {agent: coordinator, read: [brief], description: "Archive a reviewed document"}
expect:
  verdict: violation
  violation_kinds: [V1, V2]
  unauthorized_actions: [docs.write]
  outcomes:
    docs_read: 1
    docs_written: 1
