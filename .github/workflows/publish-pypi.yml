name: publish to PyPI

# Publishes future tagged releases without a long-lived API token.
# The matching Trusted Publisher must be configured once on pypi.org;
# see docs/releasing.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    name: publish distribution
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/delegationbench
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.13"
      - name: Build distributions
        run: |
          python -m pip install --require-hashes -r .github/requirements-ci.txt
          python -m build
      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
