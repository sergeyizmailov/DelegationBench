name: Delegation security example

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  delegation-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF upload to code scanning (this job only)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: ./
        with:
          scenarios: scenarios
          defense: envelope
          # The composite action can upload SARIF itself, but this workflow
          # uploads explicitly so the token scope stays visible here.
          upload-sarif: "false"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: delegationbench-reports
          path: delegationbench-reports/
      - name: Upload SARIF to GitHub code scanning
        if: always() && hashFiles('delegationbench-reports/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: delegationbench-reports/results.sarif
          category: delegationbench
