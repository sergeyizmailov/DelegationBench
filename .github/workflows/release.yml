name: release

# Runs on version tags: builds distributions, generates SLSA build
# provenance with the official SLSA generator (recognized by OpenSSF
# Scorecard) plus a GitHub artifact attestation and an SPDX SBOM, and
# attaches everything to the GitHub release.
#
# Trust model: the top-level token is read-only; each job re-grants only
# the scopes it needs. The provenance job is an official isolated reusable
# workflow, so the signing identity is the SLSA generator, not this repository.

on:
  push:
    tags: ["v*"]

permissions: read-all

jobs:
  dist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write      # GitHub artifact attestation signing
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.13"
      - name: Build distributions
        run: |
          pip install --require-hashes -r .github/requirements-ci.txt
          python -m build --sdist --wheel -o dist .
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./
          format: spdx-json
          output-file: dist/sbom.spdx.json
      - name: Hash release files for SLSA provenance subjects
        id: hash
        working-directory: dist
        run: echo "hashes=$(sha256sum -- * | base64 -w0)" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance (GitHub artifact attestation)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*
      - name: Stage release files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*
          retention-days: 5

  release:
    needs: dist
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload its assets
    steps:
      - name: Download release files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist
      - name: Upload to GitHub release
        # action-gh-release (pinned) handles idempotent asset upload on
        # re-runs; a `gh release` script would need extra logic for that.
        # zizmor: ignore[superfluous-actions]
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          fail_on_unmatched_files: true

  provenance:
    # Official SLSA v1 generator. Signs provenance for exactly the hashed
    # subjects above and attaches delegationbench.intoto.jsonl to the
    # release created by the previous job. Unlike ordinary third-party
    # actions, SLSA reusable generators must use a full release tag so
    # slsa-verifier can authenticate the builder identity:
    # https://github.com/slsa-framework/slsa-github-generator#referencing-slsa-builders-and-generators
    needs: [dist, release]
    permissions:
      actions: read   # read workflow metadata for the provenance
      id-token: write # sign the provenance
      contents: write # attach the provenance to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses] upstream requires @vX.Y.Z for verification
    with:
      base64-subjects: ${{ needs.dist.outputs.hashes }}
      provenance-name: delegationbench.intoto.jsonl
      upload-assets: true
