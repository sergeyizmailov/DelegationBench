name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e . pytest
      - name: Unit tests
        run: python -m pytest tests/ -q
      - name: Scenario corpus (no defense)
        run: delegationbench run scenarios/
      - name: Scenario corpus (reference defense)
        run: delegationbench run scenarios/ --defense envelope
      - name: Scenario corpus (signed reference defense)
        env:
          DELEGATIONBENCH_KEY: ci-only-regression-test-key
        run: delegationbench run scenarios/ --defense envelope-sign

  integration:
    # Real-framework gate: runs the suite with the optional langgraph
    # extra installed so tests/test_integration_langgraph.py executes
    # (it skips otherwise). Unpinned on purpose — gate langgraph
    # upgrades on this job (see pyproject.toml [langgraph] comment).
    # langchain is installed explicitly as a TEST-ONLY dependency: the
    # integration test builds agents with langchain.agents.create_agent
    # (langgraph.prebuilt.create_react_agent is deprecated, removed in
    # LangGraph v2). The [langgraph] extra itself stays langgraph-only.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: pip install -e '.[langgraph]' pytest 'langchain>=1,<2'
      - name: Integration tests (real LangGraph)
        run: python -m pytest tests/ -q

  sarif:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: pip install -e . jsonschema
      - name: Generate SARIF
        run: |
          delegationbench run scenarios/ --defense envelope \
            --format sarif --output results.sarif
      - name: Validate against the official SARIF 2.1.0 schema
        env:
          SARIF_SCHEMA_COMMIT: ed71d4f62db866ce3698a08a5ec3f7f2e775545d
        run: |
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/${SARIF_SCHEMA_COMMIT}/sarif-2.1/schema/sarif-schema-2.1.0.json" \
            --output sarif-schema-2.1.0.json
          python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          schema = json.loads(Path("sarif-schema-2.1.0.json").read_text())
          document = json.loads(Path("results.sarif").read_text())
          jsonschema.validate(document, schema)
          PY
      - name: Upload SARIF to GitHub code scanning
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: results.sarif
          category: delegationbench-self-test

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.13"
          cache: pip
      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist
      - name: Install wheel
        run: python -m pip install --force-reinstall dist/*.whl
      - name: Smoke test installed CLI
        run: |
          delegationbench --help
          python -m pip check
          # The corpus ships inside the wheel: running it from the installed
          # package (no repo checkout) must not regress.
          delegationbench run scenarios/ --defense envelope
