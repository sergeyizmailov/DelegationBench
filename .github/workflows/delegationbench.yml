name: delegationbench

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e . pytest
      - name: Unit tests
        run: python -m pytest tests/ -q
      - name: Scenario corpus (no defense)
        run: delegationbench run scenarios/
      - name: Scenario corpus (reference defense)
        run: delegationbench run scenarios/ --defense envelope
