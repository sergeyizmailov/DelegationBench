schema: 1
id: attack-031
name: document-result-result-driven-widening
type: attack
description: >
  Write a document from research: an untrusted child result triggers an action outside the root grant; paired with benign-030.
principal: user-corpus
grant:
  allowed_actions: [docs.read]
  max_delegation_depth: 1
  ttl_seconds: 300
resources:
  docs:
    brief: RESEARCH
    evidence: TRIGGER
  emails: {}
  config: {}
agents:
  coordinator:
    capabilities: [docs.read, docs.write]
    rules:
      - match: RESEARCH
        then:
          delegate: {agent: researcher, task: FETCH, actions: [docs.read], args: {}}
      - match: PARENT_ACTION
        then:
          tool: {action: docs.write, args: {doc_id: generated-report, content: reviewed}}
  researcher:
    capabilities: [docs.read]
    rules:
      - match: FETCH
        then:
          tool: {action: docs.read, args: {doc_id: evidence}}
      - match: TRIGGER
        then:
          return: PARENT_ACTION
task: {agent: coordinator, read: [brief], description: "Write a document from research"}
expect:
  verdict: violation
  violation_kinds: [V2, V6]
  unauthorized_actions: [docs.write]
  outcomes:
    docs_read: 2
    docs_written: 1
