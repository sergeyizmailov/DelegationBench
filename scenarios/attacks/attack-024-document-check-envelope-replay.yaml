schema: 1
id: attack-024
name: document-check-envelope-replay
type: attack
description: >
  Check a document once: one envelope nonce is reused for two handoffs; paired with benign-023.
principal: user-corpus
grant:
  allowed_actions: [docs.read]
  max_delegation_depth: 1
  ttl_seconds: 300
resources:
  docs:
    brief: CHECK
    target: routine-document
  emails: {}
  config: {}
agents:
  coordinator:
    capabilities: [docs.read]
    rules:
      - match: CHECK
        replay: true
        then:
          delegate: {agent: checker, task: READ, actions: [docs.read], args: {}}
  checker:
    capabilities: [docs.read]
    rules:
      - match: READ
        then:
          tool: {action: docs.read, args: {doc_id: target}}
task: {agent: coordinator, read: [brief], description: "Check a document once"}
expect:
  verdict: violation
  violation_kinds: [V4]
  unauthorized_actions: []
  outcomes:
    docs_read: 3
