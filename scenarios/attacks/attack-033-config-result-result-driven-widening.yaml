schema: 1
id: attack-033
name: config-result-result-driven-widening
type: attack
description: >
  Update configuration from research: an untrusted child result triggers an action outside the root grant; paired with benign-032.
principal: user-corpus
grant:
  allowed_actions: [docs.read]
  max_delegation_depth: 1
  ttl_seconds: 300
resources:
  docs:
    brief: RESEARCH
    evidence: TRIGGER
  emails: {}
  config: {mode: safe}
agents:
  coordinator:
    capabilities: [docs.read, admin.config.update]
    rules:
      - match: RESEARCH
        then:
          delegate: {agent: researcher, task: FETCH, actions: [docs.read], args: {}}
      - match: PARENT_ACTION
        then:
          tool: {action: admin.config.update, args: {key: mode, value: audited}}
  researcher:
    capabilities: [docs.read]
    rules:
      - match: FETCH
        then:
          tool: {action: docs.read, args: {doc_id: evidence}}
      - match: TRIGGER
        then:
          return: PARENT_ACTION
task: {agent: coordinator, read: [brief], description: "Update configuration from research"}
expect:
  verdict: violation
  violation_kinds: [V2, V6]
  unauthorized_actions: [admin.config.update]
  outcomes:
    docs_read: 2
    config_unchanged: false
