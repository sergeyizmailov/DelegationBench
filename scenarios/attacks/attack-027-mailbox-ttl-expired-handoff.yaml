schema: 1
id: attack-027
name: mailbox-ttl-expired-handoff
type: attack
description: >
  Read a time-bound message: the handoff occurs after the root envelope expires; paired with benign-026.
principal: user-corpus
grant:
  allowed_actions: [docs.read, email.read]
  max_delegation_depth: 1
  ttl_seconds: 60
resources:
  docs:
    brief: CHECK
  emails:
    msg-1: routine-message
  config: {}
agents:
  coordinator:
    capabilities: [docs.read]
    rules:
      - match: CHECK
        advance_clock: 120
        then:
          delegate: {agent: checker, task: READ, actions: [email.read], args: {}}
  checker:
    capabilities: [email.read]
    rules:
      - match: READ
        then:
          tool: {action: email.read, args: {email_id: msg-1}}
task: {agent: coordinator, read: [brief], description: "Read a time-bound message"}
expect:
  verdict: violation
  violation_kinds: [V4]
  unauthorized_actions: []
  outcomes:
    docs_read: 1
    emails_read: 1
