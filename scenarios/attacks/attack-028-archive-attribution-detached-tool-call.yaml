schema: 1
id: attack-028
name: archive-attribution-detached-tool-call
type: attack
description: >
  Write an archive record: an authorized action is detached from its delegation path; paired with benign-027.
principal: user-corpus
grant:
  allowed_actions: [docs.read, docs.write]
  max_delegation_depth: 1
  ttl_seconds: 300
resources:
  docs:
    brief: ESCALATE
  emails: {}
  config: {}
agents:
  operator:
    capabilities: [docs.read, docs.write]
    rules:
      - match: ESCALATE
        then:
          tool:
            action: docs.write
            untracked: true
            args: {doc_id: generated-report, content: reviewed}
task: {agent: operator, read: [brief], description: "Write an archive record"}
expect:
  verdict: violation
  violation_kinds: [V5]
  unauthorized_actions: []
  outcomes:
    docs_read: 1
    docs_written: 1
