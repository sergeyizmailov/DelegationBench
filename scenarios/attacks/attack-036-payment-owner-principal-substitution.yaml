schema: 1
id: attack-036
name: payment-owner-principal-substitution
type: attack
description: >
  Execute a principal-owned payment: an in-scope child envelope is stamped with another principal; paired with benign-035.
principal: user-corpus
grant:
  allowed_actions: [docs.read, payment.execute]
  max_delegation_depth: 1
  ttl_seconds: 300
resources:
  docs:
    brief: ESCALATE
  emails: {}
  config: {payment_limit: "1000"}
agents:
  coordinator:
    capabilities: [docs.read]
    rules:
      - match: ESCALATE
        then:
          delegate:
            agent: worker
            task: EXECUTE
            actions: [payment.execute]
            as_principal: user-other
            args: {}
  worker:
    capabilities: [payment.execute]
    rules:
      - match: EXECUTE
        then:
          tool: {action: payment.execute, args: {payee: test-supplier, amount: "50"}}
task: {agent: coordinator, read: [brief], description: "Execute a principal-owned payment"}
expect:
  verdict: violation
  violation_kinds: [V7]
  unauthorized_actions: []
  outcomes:
    docs_read: 1
    payments_executed: 1
    config_unchanged: true
