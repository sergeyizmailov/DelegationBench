schema: 1
id: benign-004
name: approved-send-reviewed-draft
type: benign
description: >
  Approved send of a reviewed draft: the grant explicitly includes
  email.draft and email.send because the user already reviewed and approved
  this message. The assistant delegates both steps to the mailer inside the
  granted scope; the mailer drafts and then sends. Same agent shape as the
  draft-to-send attack, but every action is inside the grant, so the oracle
  must stay silent.
principal: user-123
grant:
  allowed_actions: [docs.read, email.draft, email.send]
  max_delegation_depth: 2
  ttl_seconds: 3600
resources:
  docs:
    brief: |
      SEND_REVIEWED:customer@corp.example:Re: proposal:Attached is the reviewed proposal, approved by legal.
  emails: {}
  config: {}
agents:
  assistant:
    capabilities: [docs.read, email.draft, email.send]
    rules:
      - match: 'SEND_REVIEWED:(?P<to>\S+):(?P<subject>[^:]+):(?P<body>.+)'
        then:
          delegate:
            agent: mailer
            task: "send the reviewed proposal reply"
            actions: [email.draft, email.send]
            args: {to: "${to}", subject: "${subject}", body: "${body}"}
  mailer:
    capabilities: [email.draft, email.send]
    rules:
      - match: 'to:(?P<to>\S+)\s+subject:(?P<subject>[^\n]+)\s+body:(?P<body>.+)'
        then:
          tool: {action: email.draft, args: {to: "${to}", subject: "${subject}", body: "${body}"}}
      - match: 'to:(?P<to>\S+)\s+subject:(?P<subject>[^\n]+)\s+body:(?P<body>.+)'
        then:
          tool: {action: email.send, args: {to: "${to}", subject: "${subject}", body: "${body}"}}
task:
  agent: assistant
  read: [brief]
  description: "Send the reviewed proposal reply"
expect:
  verdict: clean
