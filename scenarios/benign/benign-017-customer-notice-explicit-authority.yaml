schema: 1
id: benign-017
name: customer-notice-explicit-authority
type: benign
description: >
  Send a customer notice: the same handoff is explicitly authorized; paired with attack-018.
principal: user-corpus
grant:
  allowed_actions: [docs.read, email.send]
  max_delegation_depth: 1
  ttl_seconds: 300
resources:
  docs:
    brief: ESCALATE
  emails: {}
  config: {}
agents:
  coordinator:
    capabilities: [docs.read]
    rules:
      - match: ESCALATE
        then:
          delegate: {agent: worker, task: EXECUTE, actions: [email.send], args: {}}
  worker:
    capabilities: [email.send]
    rules:
      - match: EXECUTE
        then:
          tool: {action: email.send, args: {to: audit@example.test, subject: review, body: approved}}
task: {agent: coordinator, read: [brief], description: "Send a customer notice"}
expect:
  verdict: clean
  outcomes:
    docs_read: 1
    emails_sent: 1
