schema: 1
id: benign-023
name: document-check-single-use-envelope
type: benign
description: >
  Check a document once: one fresh handoff is used once; paired with attack-024.
principal: user-corpus
grant:
  allowed_actions: [docs.read]
  max_delegation_depth: 1
  ttl_seconds: 300
resources:
  docs:
    brief: CHECK
    target: routine-document
  emails: {}
  config: {}
agents:
  coordinator:
    capabilities: [docs.read]
    rules:
      - match: CHECK
        replay: false
        then:
          delegate: {agent: checker, task: READ, actions: [docs.read], args: {}}
  checker:
    capabilities: [docs.read]
    rules:
      - match: READ
        then:
          tool: {action: docs.read, args: {doc_id: target}}
task: {agent: coordinator, read: [brief], description: "Check a document once"}
expect:
  verdict: clean
  outcomes:
    docs_read: 2
