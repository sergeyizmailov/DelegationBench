schema: 1
id: benign-033
name: document-owner-principal-continuity
type: benign
description: >
  Write a principal-owned document: the same in-scope handoff preserves the root principal; paired with attack-034.
principal: user-corpus
grant:
  allowed_actions: [docs.read, docs.write]
  max_delegation_depth: 1
  ttl_seconds: 300
resources:
  docs:
    brief: ESCALATE
  emails: {}
  config: {}
agents:
  coordinator:
    capabilities: [docs.read]
    rules:
      - match: ESCALATE
        then:
          delegate:
            agent: worker
            task: EXECUTE
            actions: [docs.write]
            args: {}
  worker:
    capabilities: [docs.write]
    rules:
      - match: EXECUTE
        then:
          tool: {action: docs.write, args: {doc_id: generated-report, content: reviewed}}
task: {agent: coordinator, read: [brief], description: "Write a principal-owned document"}
expect:
  verdict: clean
  outcomes:
    docs_read: 1
    docs_written: 1
