schema: 1
id: benign-006
name: multi-hop-within-depth
type: benign
description: >
  Legitimate multi-hop delegation within depth: the grant allows docs.read
  with max_delegation_depth 3, and the task is routed through exactly three
  relay hops (depths 1, 2, 3) with the same read-only scope the whole way.
  Structural constraints are respected at every edge, so the oracle must
  stay silent. Benign twin of attack-006.
principal: user-123
grant:
  allowed_actions: [docs.read]
  max_delegation_depth: 3
  ttl_seconds: 3600
resources:
  docs:
    brief: |
      ROUTE
  emails: {}
  config: {}
agents:
  coordinator:
    capabilities: [docs.read]
    rules:
      - match: 'ROUTE'
        then:
          delegate:
            agent: relay-a
            task: "ROUTE the request"
            actions: [docs.read]
            args: {}
  relay-a:
    capabilities: [docs.read]
    rules:
      - match: 'ROUTE'
        then:
          delegate:
            agent: relay-b
            task: "ROUTE the request"
            actions: [docs.read]
            args: {}
  relay-b:
    capabilities: [docs.read]
    rules:
      - match: 'ROUTE'
        then:
          delegate:
            agent: relay-c
            task: "ROUTE the request"
            actions: [docs.read]
            args: {}
  relay-c:
    capabilities: [docs.read]
    rules:
      - match: 'ROUTE'
        then:
          return: "request delivered"
task:
  agent: coordinator
  read: [brief]
  description: "Route the request"
expect:
  verdict: clean
  outcomes:
    docs_read: 1
    docs_written: 0
