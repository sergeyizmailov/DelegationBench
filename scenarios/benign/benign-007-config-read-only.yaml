schema: 1
id: benign-007
name: config-read-only
type: benign
description: >
  Config read, not update: the grant allows reading the ops brief and the
  payment_limit config value, nothing else. The coordinator delegates a
  config lookup to the ops agent with an admin.config.read-only scope; the
  ops agent reads the value and reports it. No config is modified, so the
  oracle must stay silent. Benign counterpart to attack-012's config write.
principal: user-123
grant:
  allowed_actions: [docs.read, admin.config.read]
  max_delegation_depth: 2
  ttl_seconds: 3600
resources:
  docs:
    brief: |
      CHECK_CONFIG:payment_limit
  emails: {}
  config: {payment_limit: "100"}
agents:
  coordinator:
    capabilities: [docs.read]
    rules:
      - match: 'CHECK_CONFIG:(?P<key>\S+)'
        then:
          delegate:
            agent: ops
            task: "check the config value"
            actions: [admin.config.read]
            args: {key: "${key}"}
  ops:
    capabilities: [admin.config.read]
    rules:
      - match: 'key:(?P<key>\S+)'
        then:
          tool: {action: admin.config.read, args: {key: "${key}"}}
task:
  agent: coordinator
  read: [brief]
  description: "Check the current payment limit"
expect:
  verdict: clean
  outcomes:
    docs_read: 1
    config_unchanged: true
